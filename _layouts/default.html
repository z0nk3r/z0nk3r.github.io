<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/ascii-background.js' | relative_url }}" defer></script>
    {% feed_meta %}
    {% seo %}
    {% unless page.image %}
    <meta property="og:image" content="{{ '/assets/images/social-preview.png' | absolute_url }}">
    <meta name="twitter:image" content="{{ '/assets/images/social-preview.png' | absolute_url }}">
    {% endunless %}
    <script>
        // Measure the real scrollbar/gutter width so header/footer can extend under it
        // without shifting their inner content (CSS calc() alone can't be trusted here
        // across browsers, so this is measured directly).
        (function () {
            function setScrollbarWidth() {
                var width = window.innerWidth - document.documentElement.clientWidth;
                document.documentElement.style.setProperty('--scrollbar-width', width + 'px');
            }
            setScrollbarWidth();
            window.addEventListener('resize', setScrollbarWidth);
        })();
    </script>
</head>
<body>
    <canvas id="ascii-bg" aria-hidden="true"></canvas>
    <header>
        <div class="header-wrapper">
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <button type="button" id="navMenuToggle" class="nav-menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="siteNav">
                {% include icon-hamburger.html %}
            </button>
            <nav id="siteNav">
                <div class="nav-search">
                    <input type="search" id="navSearchInput" class="nav-search-input" placeholder="Search…" aria-label="Search posts" autocomplete="off">
                    <button type="button" id="navSearchToggle" class="nav-search-toggle" aria-label="Search">
                        {% include icon-search.html %}
                    </button>
                </div>
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/references/' | relative_url }}">References</a>
                <a href="{{ '/blog/' | relative_url }}">Blog</a>
                <a href="{{ '/about/' | relative_url }}">About</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            </nav>
        </div>
    </header>

    <div class="page-content">
        {{ content }}
    </div>

    <footer>
        <div class="footer-wrapper">
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
            <div class="footer-icons">
                <a href="{{ '/feed.xml' | relative_url }}" class="footer-github" aria-label="RSS feed">
                    {% include icon-rss.html %}
                </a>
                <a href="https://github.com/z0nk3r" class="footer-github" target="_blank" rel="noopener" aria-label="GitHub">
                    {% include icon-github.html %}
                </a>
            </div>
        </div>
    </footer>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // Check localStorage for saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeButton();

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton();
            window.dispatchEvent(new Event('themechange'));
        });

        function updateThemeButton() {
            const theme = html.getAttribute('data-theme');
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // Header search toggle
        const navSearch = document.querySelector('.nav-search');
        const navSearchToggle = document.getElementById('navSearchToggle');
        const navSearchInput = document.getElementById('navSearchInput');

        navSearchToggle.addEventListener('click', () => {
            const isOpen = navSearch.classList.toggle('open');
            if (isOpen) {
                navSearchInput.focus();
            }
        });

        navSearchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && navSearchInput.value.trim()) {
                window.location.href = '{{ "/search/" | relative_url }}?q=' + encodeURIComponent(navSearchInput.value.trim());
            } else if (e.key === 'Escape') {
                navSearch.classList.remove('open');
                navSearchInput.value = '';
                navSearchInput.blur();
            }
        });

        document.addEventListener('click', (e) => {
            if (navSearch.classList.contains('open') && !navSearch.contains(e.target)) {
                navSearch.classList.remove('open');
            }
        });

        // Mobile hamburger menu toggle
        const navMenuToggle = document.getElementById('navMenuToggle');
        const siteNav = document.getElementById('siteNav');

        navMenuToggle.addEventListener('click', () => {
            const isOpen = siteNav.classList.toggle('open');
            navMenuToggle.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', (e) => {
            if (siteNav.classList.contains('open') && !siteNav.contains(e.target) && !navMenuToggle.contains(e.target)) {
                siteNav.classList.remove('open');
                navMenuToggle.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && siteNav.classList.contains('open')) {
                siteNav.classList.remove('open');
                navMenuToggle.setAttribute('aria-expanded', 'false');
            }
        });

        // Close the mobile menu if the viewport grows past the breakpoint (resize/rotation)
        let navMenuResizeDebounce = null;
        window.addEventListener('resize', () => {
            window.clearTimeout(navMenuResizeDebounce);
            navMenuResizeDebounce = window.setTimeout(() => {
                if (window.innerWidth > 768 && siteNav.classList.contains('open')) {
                    siteNav.classList.remove('open');
                    navMenuToggle.setAttribute('aria-expanded', 'false');
                }
            }, 150);
        });

        // Wrap every table in article content with a scrollable container. Kramdown
        // emits bare <table> elements with no wrapper, and article table itself can't
        // become a real horizontal-scroll box on its own: giving it overflow-x: auto
        // only does something once its own rendered width is allowed to exceed its
        // container (see the mobile min-width rules in style.css), and at that point
        // the overflow has to be caught by an ordinary block-level ancestor - a
        // <table> kept at display: table can't reliably serve as its own scroll
        // container without reintroducing the display: block fixed-layout bug this
        // project hit before. A plain wrapper div sidesteps that entirely.
        document.querySelectorAll('article table').forEach((table) => {
            var wrapper = document.createElement('div');
            wrapper.className = 'table-scroll';
            table.parentNode.insertBefore(wrapper, table);
            wrapper.appendChild(table);

            // Edge-fade scroll affordance: toggle can-scroll-left/right based on
            // actual scroll position, so the fade only shows on the side that
            // genuinely has more content - not just "this table happens to be
            // scrollable at all." Re-checked on scroll and on resize (column
            // widths, and therefore whether the table overflows at all, can change
            // at the mobile/desktop breakpoint).
            function updateScrollAffordance() {
                var maxScrollLeft = wrapper.scrollWidth - wrapper.clientWidth;
                wrapper.classList.toggle('can-scroll-left', wrapper.scrollLeft > 1);
                wrapper.classList.toggle('can-scroll-right', wrapper.scrollLeft < maxScrollLeft - 1);
            }
            updateScrollAffordance();
            wrapper.addEventListener('scroll', updateScrollAffordance);
            // Geist Mono loads async and can swap in after this initial check,
            // changing measured text/column widths (the same font-load race this
            // project's TOC-builder already had to account for) - re-check once
            // fonts are actually settled so the initial fade state is correct.
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(updateScrollAffordance);
            }

            var tableResizeDebounce = null;
            window.addEventListener('resize', function () {
                window.clearTimeout(tableResizeDebounce);
                tableResizeDebounce = window.setTimeout(updateScrollAffordance, 150);
            });

            // touch-action: pan-x (in style.css) is the spec-correct way to let a
            // vertical page-scroll swipe bubble past this wrapper instead of being
            // captured for horizontal scrolling, but it wasn't enough in practice on
            // real Android Chrome (confirmed by user testing after shipping it
            // alone) - Chrome resolves which element owns a touch gesture on the
            // compositor thread, synchronously, from touch-action alone, precisely
            // so scrolling doesn't have to wait on main-thread JS. A *passive*
            // touchmove handler that reacts after the fact can't retroactively
            // redirect a gesture the compositor already committed elsewhere (an
            // earlier version of this fix tried exactly that and didn't work). The
            // only reliable way to override native routing is to take the gesture
            // over directly: a non-passive touchmove that calls preventDefault() to
            // block the wrapper's own handling, then drives the page scroll
            // manually. behavior: 'instant' is required on the scrollBy call -
            // without it, the site's scroll-behavior: smooth on <html> would queue
            // every per-frame increment as its own competing animation instead of
            // tracking the finger directly.
            var touchStartX = 0;
            var touchStartY = 0;
            var touchAxisLocked = false;
            var verticalGesture = false;

            wrapper.addEventListener('touchstart', function (e) {
                if (e.touches.length !== 1) return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchAxisLocked = false;
                verticalGesture = false;
            }, { passive: true });

            wrapper.addEventListener('touchmove', function (e) {
                if (e.touches.length !== 1) return;
                var currentX = e.touches[0].clientX;
                var currentY = e.touches[0].clientY;

                if (!touchAxisLocked) {
                    var dx = currentX - touchStartX;
                    var dy = currentY - touchStartY;
                    if (Math.abs(dx) + Math.abs(dy) < 10) return;
                    touchAxisLocked = true;
                    verticalGesture = Math.abs(dy) > Math.abs(dx);
                }

                if (verticalGesture) {
                    e.preventDefault();
                    window.scrollBy({ top: touchStartY - currentY, left: 0, behavior: 'instant' });
                    touchStartY = currentY;
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
